<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PishuChat</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    
    <!-- WebSocket поддержка -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.2/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --light-bg: #f8f9fa;
            --message-bg: #e9ecef;
            --user-message-bg: #4361ee;
            --user-message-color: white;
        }
        
        body {
            background-color: #f5f7fb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .chat-container {
            height: 90vh;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            background: white;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2px 20px;
            border-radius: 15px 15px 0 0;
        }
        
        .chat-messages {
            height: calc(100% - 150px);
            overflow-y: auto;
            padding: 2px 5px;
            background-color: white;
            display: flex;
		    flex-direction: column;
		    width: 100%;
        }
        
        .message {
        	margin-left:15px;
        	margin-right:15px;
            clear: both;
        }
        
        .message-incoming {
            float: left;
        }
        
        .message-outgoing {
            float: right;
        }
        
        .message-content {
            padding: 5px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .incoming .message-content {
            background-color: var(--message-bg);
            border-bottom-left-radius: 5px;
        }
        
        .outgoing .message-content {
            background-color: var(--user-message-bg);
            color: var(--user-message-color);
            border-bottom-right-radius: 5px;
        }
        .incoming {
		    clear: both;
		    align-self: flex-start;
		}
		
		.outgoing {
		    clear: both;
		    align-self: flex-end;
		}
		
		.chat-messages::after {
		    content: "";
		    display: table;
		    clear: both;
		}
        
        .message-sender {
            font-size: 0.85rem;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 2px;
            text-align: right;
        }
        
        .online-users {
            background-color: white;
            border-left: 1px solid #dee2e6;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }
        
        .user-item {
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .user-item:hover {
            background-color: var(--light-bg);
        }
        
        .user-item.active {
            background-color: var(--primary-color);
            color: white;
        }
        
        .user-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }
        
        .status-online {
            background-color: #4cc9f0;
        }
        
        .status-away {
            background-color: #f8961e;
        }
        
        .status-offline {
            background-color: #adb5bd;
        }
        
        .chat-input-container {
            padding: 10px;
            background-color: white;
            border-top: 1px solid #dee2e6;
        }
        
        .typing-indicator {
            font-size: 0.9rem;
            color: #6c757d;
            font-style: italic;
            height: 16px;
            margin-left: 10px;
        }
        
        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message {
            animation: fadeIn 0.3s ease;
        }
        
        /* Прокрутка */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-chat-dots me-2"></i>PishuChat
            </a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" th:text="'Добро пожаловать, ' + ${username}">Добро пожаловать, User</span>
                <div class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Настройки</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-moon me-2"></i>Тема</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Выйти</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контейнер -->
    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Основной чат -->
            <div class="col-md-9">
                <div class="chat-container">
                    <!-- Заголовок чата -->
                    <div class="chat-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h4 class="mb-1"><i class="bi bi-chat-left-text me-2"></i>Общий чат</h4>
                                <small id="connectionStatus">Подключение...</small>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-light me-2" onclick="clearChat()">
                                    <i class="bi bi-trash"></i> Очистить
                                </button>
                                <div class="btn-group">
                                    <button class="btn btn-sm btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                        <i class="bi bi-people"></i> Участники: <span id="onlineCount">0</span>
                                    </button>
                                    <ul class="dropdown-menu" id="onlineUsersDropdown">
                                        <!-- Список онлайн-пользователей -->
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Сообщения -->
                    <div class="chat-messages" id="chatMessages">
                        <!-- Сообщения будут добавляться здесь через JavaScript -->
                        <div class="text-center text-muted my-5" id="noMessages">
                            <i class="bi bi-chat-left" style="font-size: 3rem;"></i>
                            <p class="mt-3">Нет сообщений. Будьте первым!</p>
                        </div>
                    </div>

                    <!-- Индикатор набора текста -->
                    <div class="typing-indicator px-3" id="typingIndicator"></div>

                    <!-- Поле ввода -->
                    <div class="chat-input-container">
                        <form id="messageForm">
                            <div class="input-group">
                                <button class="btn btn-outline-secondary" type="button" onclick="toggleEmojiPicker()">
                                    <i class="bi bi-emoji-smile"></i>
                                </button>
                                <input type="text" class="form-control" id="messageInput" 
                                       placeholder="Введите сообщение..." autocomplete="off"
                                       onkeydown="handleTyping(event)">
                                <button class="btn btn-outline-secondary" type="button" onclick="attachFile()">
                                    <i class="bi bi-paperclip"></i>
                                </button>
                                <button class="btn btn-primary" type="submit">
                                    <i class="bi bi-send"></i> Отправить
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Онлайн пользователи -->
            <div class="col-md-3 d-none d-md-block">
                <div class="online-users">
                    <h5><i class="bi bi-person-check me-2"></i>Онлайн</h5>
                    <div class="list-group" id="onlineUsersList">
                        <!-- Список пользователей будет добавляться здесь -->
                    </div>
                    
                    <h5 class="mt-4"><i class="bi bi-hash me-2"></i>Чаты</h5>
                    <div class="list-group" id="chatRooms">
                        <a href="#" class="list-group-item list-group-item-action active">
                            <i class="bi bi-chat-left-text me-2"></i>Общий чат
                            <span class="badge bg-primary float-end">5</span>
                        </a>
                       <!--  <a href="#" class="list-group-item list-group-item-action">
                            <i class="bi bi-people me-2"></i>Рабочая группа
                        </a> -->
                        <a href="#" class="list-group-item list-group-item-action">
                            <i class="bi bi-lock me-2"></i>Приватный чат
                            <span class="badge bg-primary float-end">15</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Emoji Picker (скрыт по умолчанию) -->
    <div class="emoji-picker" id="emojiPicker" style="display: none; position: absolute; bottom: 80px; left: 20px; background: white; border: 1px solid #ddd; border-radius: 10px; padding: 10px; z-index: 1000;">
        <div class="emoji-grid">
            <button type="button" class="btn btn-sm m-1" onclick="insertEmoji('😀')">😀</button>
            <button type="button" class="btn btn-sm m-1" onclick="insertEmoji('😂')">😂</button>
            <button type="button" class="btn btn-sm m-1" onclick="insertEmoji('😊')">😊</button>
            <button type="button" class="btn btn-sm m-1" onclick="insertEmoji('😎')">😎</button>
            <button type="button" class="btn btn-sm m-1" onclick="insertEmoji('👍')">👍</button>
            <button type="button" class="btn btn-sm m-1" onclick="insertEmoji('❤️')">❤️</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script th:inline="javascript">
        // Конфигурация WebSocket
        const username = /*[[${username}]]*/ 'Гость';
       //const username = document.getElementById('username').textContent;
        const chatRoom = 'general';
        let stompClient = null;
        let typingTimeout = null;
        
        // Инициализация WebSocket
        function connect() {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function(frame) {
                console.log('Connected: ' + frame);
                document.getElementById('connectionStatus').textContent = 'Подключено';
                document.getElementById('connectionStatus').style.color = 'lightgreen';
                
                const chatRoom = 'general';
                // Подписка на общие сообщения
                stompClient.subscribe('/topic/chat/' + chatRoom, function(message) {
                    showMessage(JSON.parse(message.body));
                });
                
                // Подписка на приватные сообщения
                stompClient.subscribe('/user/queue/private', function(message) {
                    showPrivateMessage(JSON.parse(message.body));
                });
                
                // Подписка на статусы пользователей
                stompClient.subscribe('/topic/online', function(users) {
                    updateOnlineUsers(JSON.parse(users.body));
                });
                
                // Подписка на индикаторы набора текста
                stompClient.subscribe('/topic/typing/' + chatRoom, function(typing) {
                    showTypingIndicator(JSON.parse(typing.body));
                });
                
	            // Отправка информации о подключении
              	stompClient.send("/app/chat.join", {}, 
                  	JSON.stringify({
                      'sender': username, 
                      'room': chatRoom,
                      'type': 'JOIN'
                  })
	            );
            }, function(error) {
                console.error('WebSocket error: ', error);
                document.getElementById('connectionStatus').textContent = 'Ошибка подключения';
                document.getElementById('connectionStatus').style.color = 'red';
                // Переподключение через 5 секунд
                setTimeout(connect, 5000);
            });
        }
        
        // Отправка сообщения
        document.getElementById('messageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if(message && stompClient) {
                const chatMessage = {
                    sender: username,
                    content: message,
                    room: chatRoom,
                    type: 'CHAT',
                    timestamp: new Date().toISOString()
                };
                
                stompClient.send("/app/chat.send", {}, JSON.stringify(chatMessage));
                messageInput.value = '';
                
                // Скрываем индикатор набора текста
                if(stompClient) {
                    stompClient.send("/app/chat.typing", {}, 
                        JSON.stringify({'sender': username, 'room': chatRoom, 'typing': false})
                    );
                }
            }
        });
        
        // Отображение сообщения
        function showMessage(message) {
            const messagesContainer = document.getElementById('chatMessages');
            const noMessages = document.getElementById('noMessages');
            
            if(noMessages) {
                noMessages.style.display = 'none';
            }
            
            const isOwnMessage = message.sender === username;
            const messageElement = document.createElement('div');
            messageElement.className = `message ${isOwnMessage ? 'outgoing' : 'incoming'}`;
            
            const time = new Date(message.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            messageElement.innerHTML = `
                <div class="message-sender">${isOwnMessage ? 'Вы' : message.sender}</div>
                <div class="message-content">
                    ${escapeHtml(message.content)}
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Отображение приватного сообщения
        function showPrivateMessage(message) {
            showMessage(message);
            // Можно добавить визуальное отличие для приватных сообщений
        }
        
        // Обновление списка онлайн-пользователей
		function updateOnlineUsers(users) {
		    console.log('Получен список пользователей:', users); // Для отладки
		    
		    const onlineList = document.getElementById('onlineUsersList');
		    const dropdown = document.getElementById('onlineUsersDropdown');
		    const onlineCount = document.getElementById('onlineCount');
		    
		    // Очищаем списки
		    onlineList.innerHTML = '';
		    dropdown.innerHTML = '';
		    
		    // Проверяем, что users - это массив
		    if (!Array.isArray(users)) {
		        console.error('Ожидался массив пользователей, получено:', users);
		        users = [];
		    }
		    
		    // Обновляем счетчик
		    onlineCount.textContent = users.length;
		    
		    // Добавляем каждого пользователя
		    users.forEach(user => {
		        // Пропускаем пустые имена
		        if (!user || user.trim() === '') return;
		        
		        // Проверяем, является ли этот пользователь текущим
		        const isCurrentUser = user === username;
		        
		        // Для боковой панели
		        const userItem = document.createElement('a');
		        userItem.href = '#';
		        userItem.className = 'list-group-item list-group-item-action user-item';
		        userItem.innerHTML = `
		            <span class="user-status status-online"></span>
		            <strong>${user}</strong>
		            ${isCurrentUser ? ' (Вы)' : ''}
		        `;
		        userItem.onclick = () => startPrivateChat(user);
		        onlineList.appendChild(userItem);
		        
		        // Для dropdown в шапке
		        const dropdownItem = document.createElement('li');
		        const dropdownLink = document.createElement('a');
		        dropdownLink.className = 'dropdown-item';
		        dropdownLink.href = '#';
		        dropdownLink.innerHTML = `
		            <span class="user-status status-online me-2"></span>
		            ${user}
		        `;
		        dropdownLink.onclick = () => startPrivateChat(user);
		        dropdownItem.appendChild(dropdownLink);
		        dropdown.appendChild(dropdownItem);
		    });
		    
		    // Если список пуст, показываем заглушку
		    if (users.length === 0) {
		        const emptyItem = document.createElement('div');
		        emptyItem.className = 'text-muted small text-center py-3';
		        emptyItem.textContent = 'Нет активных пользователей';
		        onlineList.appendChild(emptyItem);
		    }
		}
        
        // Индикатор набора текста
        function handleTyping(event) {
            if(!stompClient) return;
            
            // Отправляем статус набора текста
            const typingEvent = {
                sender: username,
                room: chatRoom,
                typing: true
            };
            
            stompClient.send("/app/chat.typing", {}, JSON.stringify(typingEvent));
            
            // Сбрасываем таймер
            if(typingTimeout) {
                clearTimeout(typingTimeout);
            }
            
            // Через 2 секунды отправляем false
            typingTimeout = setTimeout(() => {
                typingEvent.typing = false;
                stompClient.send("/app/chat.typing", {}, JSON.stringify(typingEvent));
            }, 2000);
        }
        
        // Отображение индикатора набора текста
        function showTypingIndicator(typing) {
            const indicator = document.getElementById('typingIndicator');
            
            if(typing.typing && typing.sender !== username) {
                indicator.textContent = `${typing.sender} печатает...`;
            } else {
                indicator.textContent = '';
            }
        }
        
        // Начать приватный чат
        function startPrivateChat(withUser) {
            if(confirm(`Начать приватный чат с ${withUser}?`)) {
                // Можно переключиться на приватный чат
                console.log(`Starting private chat with ${withUser}`);
            }
        }
        
        // Очистка чата
        function clearChat() {
            if(confirm('Очистить историю чата?')) {
                document.getElementById('chatMessages').innerHTML = `
                    <div class="text-center text-muted my-5" id="noMessages">
                        <i class="bi bi-chat-left" style="font-size: 3rem;"></i>
                        <p class="mt-3">Нет сообщений. Будьте первым!</p>
                    </div>
                `;
            }
        }
        
        // Emoji функции
        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
        }
        
        function insertEmoji(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
            document.getElementById('emojiPicker').style.display = 'none';
        }
        
        // Прикрепление файла
        function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if(file) {
                    alert(`Файл "${file.name}" выбран. Загрузка не реализована в демо.`);
                }
            };
            input.click();
        }
        
        // Экранирование HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Инициализация при загрузке
        window.onload = function() {
            connect();
            username = document.getElementById('username').textContent;
            document.getElementById('messageInput').focus();
        };
        
        // Обработка закрытия вкладки
        window.onbeforeunload = function() {
            if(stompClient) {
                stompClient.send("/app/chat.leave", {}, 
                    JSON.stringify({'sender': username, 'room': chatRoom})
                );
            }
        };
    </script>
</body>
</html>
