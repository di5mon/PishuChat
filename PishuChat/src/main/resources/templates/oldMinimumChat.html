<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Минимальный чат</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .chat-container { max-width: 800px; margin: 0 auto; }
        .messages { 
            border: 1px solid #ddd; 
            height: 400px; 
            overflow-y: auto; 
            padding: 10px;
            margin-bottom: 10px;
        }
        .message { margin: 5px 0; padding: 8px; border-radius: 5px; }
        .message.you { background: #e3f2fd; text-align: right; }
        .message.other { background: #f5f5f5; }
        .sender { font-weight: bold; color: #333; }
        .time { font-size: 0.8em; color: #666; }
        .input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Чат: <span id="username" th:text="${username}"></span></h2>
        
        <div id="messages" class="messages">
            <!-- Сообщения появятся здесь -->
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Ваше сообщение..." />
            <button onclick="sendMessage()">Отправить</button>
        </div>
        
        <p><small>Подключено: <span id="status">Не подключено</span></small></p>
    </div>

    <!-- WebSocket библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.2/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    
    <script>
        // Подключение к WebSocket
        let stompClient = null;
        const username = document.getElementById('username').textContent;
        
        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function(frame) {
                document.getElementById('status').textContent = 'Подключено';
                document.getElementById('status').style.color = 'green';
                
                // Подписываемся на получение сообщений
                stompClient.subscribe('/topic/messages', function(message) {
                    showMessage(JSON.parse(message.body));
                });
            });
        }
        
        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if(content && stompClient) {
                const message = {
                    sender: username,
                    content: content,
                    timestamp: new Date()
                };
                
                stompClient.send("/app/chat", {}, JSON.stringify(message));
                input.value = '';
                input.focus();
            }
        }
        
        // Отображение сообщения
        function showMessage(message) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            
            const isYou = message.sender === username;
            messageDiv.className = `message ${isYou ? 'you' : 'other'}`;
            
            const time = new Date(message.timestamp).toLocaleTimeString();
            messageDiv.innerHTML = `
                <div class="sender">${message.sender}</div>
                <div>${message.content}</div>
                <div class="time">${time}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Отправка по Enter
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') sendMessage();
        });
        
        // Запуск при загрузке
        window.onload = function() {
            connect();
            document.getElementById('messageInput').focus();
        };
    </script>
</body>
</html>
